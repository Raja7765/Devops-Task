version: '3.8'

networks:
  redis-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24

x-redis-node: &redis-node-template
  build:
    context: .
    dockerfile: Dockerfile
  networks:
    redis-net:

services:
  redis-node-1:
    <<: *redis-node-template
    container_name: redis-node-1
    ports:
      - "2211:22"
    networks:
      redis-net:
        ipv4_address: 10.10.0.11

  redis-node-2:
    <<: *redis-node-template
    container_name: redis-node-2
    ports:
      - "2212:22"
    networks:
      redis-net:
        ipv4_address: 10.10.0.12

  redis-node-3:
    <<: *redis-node-template
    container_name: redis-node-3
    ports:
      - "2213:22"
    networks:
      redis-net:
        ipv4_address: 10.10.0.13

  redis-node-4:
    <<: *redis-node-template
    container_name: redis-node-4
    ports:
      - "2214:22"
    networks:
      redis-net:
        ipv4_address: 10.10.0.14

  redis-node-5:
    <<: *redis-node-template
    container_name: redis-node-5
    ports:
      - "2215:22"
    networks:
      redis-net:
        ipv4_address: 10.10.0.15

  redis-node-6:
    <<: *redis-node-template
    container_name: redis-node-6
    ports:
      - "2216:22"
    networks:
      redis-net:
        ipv4_address: 10.10.0.16


  redis-node-7:
    build: .
    container_name: redis-node-7
    networks:
      redis-net:
        ipv4_address: 10.10.0.17
    ports:
      - "2217:22"
    privileged: true

  redis-node-8:
    build: .
    container_name: redis-node-8
    networks:
      redis-net:
        ipv4_address: 10.10.0.18
    ports:
      - "2218:22"
    privileged: true
